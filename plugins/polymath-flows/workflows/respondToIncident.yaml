schemaVersion: 0.1
name: respondToIncident
chainsTo:
  - incidentRetroToActions
version: 0.2.0
description: Drive incident response — context, triage, query, mitigation note, postmortem, follow-up tickets.
whenToUse: "Drive a live incident end-to-end to postmortem."
triggers:
  - "we have an incident"
  - "prod is down, help"
  - "page just fired, walk me through response"
  - "sev1, what do I do"
detectionSignals:
  paths:
    - "docs/postmortems/**"
  intents:
    - "incident"
    - "outage"
    - "input:incidentId"
requires:
  plugins:
    - polymath-core
    - polymath-incident
  capabilities:
    # Three capabilities. v0.2 routes each through the project's
    # .polymath/capabilities.yaml choice rather than hard-coding pagerduty +
    # datadog + jira. Set the providers in that file and the workflow runs
    # end-to-end against opsgenie + honeycomb + linear if that is the stack.
    pager: true
    observability: true
    issue_tracker: true
inputs:
  - name: incidentId
    type: string
    required: true
    description: Pager incident ID (e.g. PT9X3HQ7) or full incident URL.
  - name: sev
    type: enum
    values: [sev1, sev2, sev3]
    default: sev2
    description: Severity (mirrors polymath-incident:incident-triage scale).
guards:
  - id: postmortems-dir-writable
    type: command
    command: mkdir -p docs/postmortems && [ -w docs/postmortems ]
steps:
  - id: context
    invoke: ${capabilities.pager.plugin}:page-context
    prompt: Fetch the active ${capabilities.pager.provider} incident ${inputs.incidentId} and front-load context for the responder.
    artifacts:
      - docs/postmortems/${workflow.slug}-context.md
  - id: triage
    invoke: polymath-incident:incident-triage
    prompt: Triage incident ${inputs.incidentId} given the fetched context. Confirm severity (default ${inputs.sev}), name roles, decide mitigate-vs-diagnose with a timebox.
    needs: [context]
  - id: signals
    invoke: ${capabilities.observability.plugin}:query-during-incident
    prompt: Run focused ${capabilities.observability.provider} queries to narrow root cause for incident ${inputs.incidentId}. Surface one most-likely cause + one fallback.
    needs: [triage]
    artifacts:
      - docs/postmortems/${workflow.slug}-signals.md
  - id: postmortem
    invoke: polymath-incident:postmortem-blameless
    prompt: After incident is resolved, draft the blameless postmortem at docs/postmortems/${workflow.slug}.md.
    needs: [signals]
    artifacts:
      - docs/postmortems/${workflow.slug}.md
  - id: tickets
    invoke: ${capabilities.issue_tracker.plugin}:file-bug-from-incident
    prompt: File ${capabilities.issue_tracker.provider} tickets for each action item in the postmortem at docs/postmortems/${workflow.slug}.md. Update the postmortem with the resulting ticket keys.
    needs: [postmortem]
mustPass:
  - id: postmortem-exists
    type: fileExists
    path: docs/postmortems/${workflow.slug}.md
  - id: postmortem-valid
    type: artifactValid
    path: docs/postmortems/${workflow.slug}.md
    artifact: Postmortem
  - id: triage-named-roles
    type: stepSummaryMatches
    step: triage
    pattern: "(Incident Commander|IC|incident commander)"
  - id: tickets-filed
    type: stepSummaryMatches
    step: tickets
    pattern: "(JIRA|PROJ|created|filed|tracked|ticket)"
