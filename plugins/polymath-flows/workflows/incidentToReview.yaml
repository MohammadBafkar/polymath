schemaVersion: 0.1
name: incidentToReview
version: 0.1.0
description: Drive a live incident through to filed follow-up actions — triage, comms, blameless postmortem, then decompose the actions into trackable work items.
whenToUse: "Live incident through to filed follow-up actions."
triggers:
  - "take this incident from response all the way to action items"
  - "respond to this incident and then track the follow-ups"
  - "handle the outage and produce the postmortem actions"
  - "incident response through to retro work items"
detectionSignals:
  paths:
    - docs/postmortems/**
  intents:
    - incident-to-review
requires:
  plugins:
    - polymath-core
    - polymath-incident
    - polymath-planning
inputs:
  - name: incident
    type: string
    required: true
    description: Incident identifier or short title; used for the slug.
guards:
  - id: git-worktree-readable
    type: command
    command: git status --short
steps:
  - id: triage
    invoke: polymath-incident:incident-triage
    prompt: Triage incident ${inputs.incident} — classify severity, name the incident commander, decide mitigate vs investigate.
  - id: comms
    invoke: polymath-incident:comms-update
    prompt: Draft the incident comms update for the current state and audience.
    needs: [triage]
  - id: postmortem
    invoke: polymath-incident:postmortem-blameless
    prompt: Write the blameless postmortem to docs/postmortems/${workflow.slug}.md — timeline, root cause, action items.
    needs: [comms]
    artifacts:
      - docs/postmortems/${workflow.slug}.md
  - id: actions
    invoke: polymath-planning:work-breakdown
    prompt: Decompose the postmortem action items into independently completable, trackable work items with owners; write to docs/plans/${workflow.slug}-actions.md.
    needs: [postmortem]
    artifacts:
      - docs/plans/${workflow.slug}-actions.md
mustPass:
  - id: postmortem-exists
    type: fileExists
    path: docs/postmortems/${workflow.slug}.md
  - id: actions-exist
    type: fileExists
    path: docs/plans/${workflow.slug}-actions.md
  - id: incident-docs-produced
    type: diffConstraint
    filesChanged:
      min: 2
      max: 20
    pathAllowlist:
      - "docs/postmortems/**"
      - "docs/plans/**"
