schemaVersion: 0.1
name: bumpDependency
version: 0.2.0
description: Bump a dependency safely — vuln triage first, scoped read-code, smallest update, lint + tests, review.
requires:
  plugins:
    - polymath-core
    - polymath-engineering
  capabilities:
    # Project picks the scanner in .polymath/capabilities.yaml (snyk |
    # dependabot | github_advanced_security). v0.2 routes the triage step
    # through whichever the project configured.
    vulnerability_scanner: true
inputs:
  - name: dependency
    type: string
    required: true
    description: Package name being bumped (e.g. "lodash", "@types/node", "django").
  - name: targetVersion
    type: string
    required: false
    description: Explicit target version. Absent → bump to latest minor within the current major.
guards:
  - id: bump-notes-dir
    type: command
    command: mkdir -p docs/dep-bumps && [ -w docs/dep-bumps ]
steps:
  - id: vuln-triage
    invoke: ${capabilities.vulnerability_scanner.plugin}:triage-vulns
    prompt: Triage ${capabilities.vulnerability_scanner.provider} findings on ${inputs.dependency}. If there are open critical findings, prefer a target version that closes them. Save findings classification to docs/dep-bumps/${workflow.slug}-vulns.md.
    artifacts:
      - docs/dep-bumps/${workflow.slug}-vulns.md
  - id: orient
    invoke: polymath-engineering:read-code
    prompt: Locate every call site of ${inputs.dependency} in this codebase. Note any uses of APIs that the target version's release notes flag as breaking.
    needs: [vuln-triage]
  - id: bump
    invoke: polymath-engineering:feature-dev
    prompt: Apply the smallest version bump of ${inputs.dependency} that closes the criticals from vuln-triage. Use ${inputs.targetVersion} if provided; otherwise pick the smallest safe bump. Adjust call sites only where breaking changes require it; do not opportunistically refactor.
    needs: [orient]
  - id: review
    invoke: polymath-engineering:code-review
    prompt: Review the diff for correctness, scope creep (no opportunistic refactors), and missing tests around the changed call sites.
    needs: [bump]
  - id: verify
    invoke: polymath-engineering:verify-change
    prompt: Run lint + typecheck + tests. Confirm the criticals from vuln-triage are closed (re-scan or check fixed-versions). Summary must include "test" or "verified".
    needs: [review]
mustPass:
  # Strong-deterministic gate: a dep bump must change something. Path
  # allowlist scopes the change to dep manifests, lockfiles, and the
  # bump-notes doc — preventing the workflow from drifting into source
  # refactors. linesChanged.max guards against an LLM rewriting half the
  # lockfile by hand instead of letting the package manager do it.
  - id: bump-produced-scoped-diff
    type: diffConstraint
    filesChanged:
      min: 1
      max: 20
    pathAllowlist:
      - "docs/dep-bumps/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "requirements.txt"
      - "pyproject.toml"
      - "poetry.lock"
      - "uv.lock"
      - "go.mod"
      - "go.sum"
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/*.csproj"
      - "Directory.Packages.props"
  - id: vulns-doc-exists
    type: fileExists
    path: docs/dep-bumps/${workflow.slug}-vulns.md
  - id: verify-mentions-tests
    type: stepSummaryMatches
    severity: advisory
    step: verify
    pattern: "(test|tests|verified|verification)"
  - id: review-checks-scope
    type: stepSummaryMatches
    severity: advisory
    step: review
    pattern: "(scope|refactor|simpl|missing)"
