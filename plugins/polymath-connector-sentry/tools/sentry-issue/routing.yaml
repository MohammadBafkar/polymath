# Routing for tool polymath-connector-sentry:sentry-issue. Compiled into route-signals.json by
# tools/build-surface-index.py. Schema: registry/schemas/surface-routing.schema.json
# Require a Sentry-specific URL shape: a *.sentry.io host, or the
# organizations/<org>/issues/<id> path (self-hosted). A bare `/issues/<n>` on any
# host (matched the old pattern) hits unrelated trackers, so it was dropped.
url:
- https://[A-Za-z0-9.-]*sentry\.io/(?:organizations/[A-Za-z0-9_-]+/)?issues/[0-9]+
- https://[A-Za-z0-9.-]+/organizations/[A-Za-z0-9_-]+/issues/[0-9]+
intents:
- sentry issue
- sentry error
capabilities:
- observability
