schemaVersion: 0.1
name: {{name}}
version: 0.1.0
description: {{one_line_description}}
# Routing surface — makes this workflow discoverable so the agent can PROPOSE it
# from context instead of only running it by name. Run tools/build-workflow-index.py
# after editing. whenToUse must be terse (it is injected always-on).
whenToUse: One-line routing hint — when this workflow is the right arc to propose.
triggers:
  - replace with a naive user phrasing
  - and another distinct phrasing
  - and a third (3-5 total, unique across all workflows)
detectionSignals:
  paths:
    - docs/{{name}}/**
  intents:
    - {{name}}
requires:
  plugins:
    - polymath-core
    # Add any other plugins this workflow invokes.
inputs:
  - name: title
    type: string
    required: true
    description: Short title for the work being driven through the workflow.
  - name: scope
    type: enum
    values: [small, medium]
    default: small
guards:
  - id: git-worktree-readable
    type: command
    command: git status --short
steps:
  - id: first-step
    invoke: polymath-core:conventions
    prompt: Replace this with the first instruction the executor should drive.
    artifacts:
      - docs/{{workflow.slug}}-notes.md
mustPass:
  - id: notes-exist
    type: fileExists
    path: docs/{{workflow.slug}}-notes.md
