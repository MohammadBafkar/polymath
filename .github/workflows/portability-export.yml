name: portability-export

# Verifies the advertised agentskills.io export path stays buildable on every
# PR and push: a frontmatter change, skill rename, or template move that would
# break `tools/export-agents-skills.py` fails here instead of silently when a
# user tries to export. Token-free and hermetic (builds into a temp dir).
# See docs/PORTABILITY.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: portability-export-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  export-check:
    name: export-agents-skills --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the agentskills.io bundle into a temp dir and validate it
        run: python3 tools/export-agents-skills.py --check
