name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema pyyaml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pinned claude CLI (MANIFEST-1 must actually run in CI)
        run: npm install -g @anthropic-ai/claude-code@2.1.175
      - name: Validate marketplace.json
        run: |
          python3 - <<'PY'
          import json, sys, pathlib
          p = pathlib.Path(".claude-plugin/marketplace.json")
          data = json.loads(p.read_text())
          assert data["name"] == "polymath", f"unexpected marketplace name: {data['name']}"
          for plugin in data["plugins"]:
              src = pathlib.Path(plugin["source"])
              if not src.exists():
                  print(f"::error::missing plugin source: {src}")
                  sys.exit(1)
              manifest = src / ".claude-plugin" / "plugin.json"
              if not manifest.exists():
                  print(f"::error::missing manifest: {manifest}")
                  sys.exit(1)
              json.loads(manifest.read_text())
          print(f"OK: {len(data['plugins'])} plugins validated")
          PY
      - name: Validate workflow YAMLs against schema
        run: |
          python3 - <<'PY'
          import json, sys, pathlib
          try:
              import yaml
              import jsonschema
          except ImportError as e:
              print(f"::error::missing dep: {e}")
              sys.exit(1)
          schema = json.loads(pathlib.Path("registry/schemas/workflow.schema.json").read_text())
          validator = jsonschema.Draft202012Validator(schema)
          fail = 0
          for wf in pathlib.Path("plugins").rglob("workflows/*.yaml"):
              data = yaml.safe_load(wf.read_text())
              errors = sorted(validator.iter_errors(data), key=lambda e: e.path)
              if errors:
                  for err in errors:
                      print(f"::error file={wf}::{list(err.path)}: {err.message}")
                  fail = 1
              else:
                  print(f"OK: {wf}")
          sys.exit(fail)
          PY
      - name: Run validate-all.sh
        run: bash tools/validate-all.sh
      - name: Run conformance.sh
        run: bash tools/conformance.sh --all

  secret-scan:
    # SECRET-1: filesystem secret scan over the checked-out tree. Pinned
    # binary + checksum (no third-party action); detection is unit-proven
    # by tests/tools/test_secret_scan.py.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
      - name: gitleaks (SECRET-1)
        run: ./gitleaks detect --source . --no-git --redact --exit-code 1
